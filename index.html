  .tpl-btn.active { background:var(--color-background-info); color:var(--color-text-info); border:none; }
  .tpl-legend { display:flex; gap:14px; margin-bottom:14px; flex-wrap:wrap; font-size:11px; color:var(--color-text-secondary); }
  .tpl-table { width:100%; border-collapse:collapse; }
  .tpl-table th { text-align:left; font-size:11px; font-weight:500; color:var(--color-text-secondary); padding:6px 8px; border-bottom:0.5px solid var(--color-border-tertiary); white-space:nowrap; }
  .tpl-table td { padding:5px 8px; font-size:12px; vertical-align:middle; border-bottom:0.5px solid var(--color-border-tertiary); }
  .tpl-group-header td { padding:10px 8px 6px; font-size:13px; font-weight:500; border-bottom:0.5px solid var(--color-border-secondary); }
  .tpl-task-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:320px; }
  .tpl-date { color:var(--color-text-secondary); white-space:nowrap; font-size:11px; }
  .tpl-bar-cell { min-width:200px; }
  .tpl-bar-track { position:relative; height:18px; width:100%; }
  .tpl-bar { position:absolute; top:2px; height:14px; border-radius:3px; min-width:4px; }
  .tpl-bar-label { position:absolute; top:0; height:18px; line-height:18px; font-size:10px; color:var(--color-text-secondary); white-space:nowrap; pointer-events:none; }
  .tpl-diamond { width:10px; height:10px; transform:rotate(45deg); display:inline-block; vertical-align:middle; margin-right:4px; }
  .tpl-circle { width:10px; height:10px; border-radius:50%; display:inline-block; vertical-align:middle; margin-right:4px; }

  .tpl-expand { cursor:pointer; user-select:none; padding:2px 6px; font-size:11px; border-radius:var(--border-radius-md); background:var(--color-background-secondary); color:var(--color-text-secondary); border:none; margin-left:6px; }

  .tpl-progress { display:inline-flex; align-items:center; gap:5px; margin-left:8px; font-size:11px; font-weight:400; color:var(--color-text-secondary); }

var milestonePcts = keyDates.filter(function(k){return k.t==="milestone";}).map(function(k){return pct(toD(k.d));});
var todayPct = pct(today);

var currentView = "summary";
var expandedGroups = {};

function setView(v){
  currentView = v;
  if(v==="full"){
    groups.forEach(function(g){ expandedGroups[g.id]=true; });
  } else {
    expandedGroups = {};
  }
  document.querySelectorAll(".tpl-btn").forEach(function(b){ b.classList.remove("active"); });
  document.querySelector(".tpl-btn[onclick=\"setView('"+v+"')\"]").classList.add("active");
  render();
}

function toggleGroup(g){
  expandedGroups[g] = !expandedGroups[g];
  render();
}

function anyExpanded(){
  for(var k in expandedGroups){ if(expandedGroups[k]) return true; }
  return false;
}

function todayMark(p){ return "<div class='tpl-today-line' style='left:"+p+"%;'></div>"; }
function msMark(pcts){ return pcts.map(function(p){ return "<div class='tpl-milestone-line' style='left:"+p+"%;'></div>"; }).join(""); }
function barTrack(inner){ return "<td class='tpl-bar-cell'><div class='tpl-bar-track'>"+todayMark(todayPct)+msMark(milestonePcts)+inner+"</div></td>"; }

function progressBar(closed, total, color){
  var p = Math.round((closed/total)*100);
  return "<span class='tpl-progress'><span class='tpl-progress-bar'><span class='tpl-progress-fill' style='width:"+p+"%;background:"+color+";'></span></span>"+closed+"/"+total+"</span>";
}

function render(){
  var showTL = anyExpanded();
  var cols = showTL ? 3 : 2;

  var html = "<thead><tr><th style='width:"+(showTL?"35":"55")+"%;'>Task</th><th style='width:"+(showTL?"15":"25")+"%;'>Date</th>";
  if(showTL) html += "<th class='tpl-bar-cell'>Timeline</th>";
  html += "</tr></thead><tbody>";

  var visibleKeyDates = currentView === "summary" ? keyDates.filter(function(k){ return !k.done; }) : keyDates;
  html += "<tr class='tpl-group-header'><td colspan='"+cols+"'>Key dates <span style='font-weight:400;font-size:11px;color:var(--color-text-secondary);'>("+visibleKeyDates.length+")</span></td></tr>";
  visibleKeyDates.forEach(function(k){
    var cls = k.t==="milestone" ? "tpl-type-milestone" : k.t==="client" ? "tpl-type-client" : "tpl-type-meeting";
    var icon = k.t==="milestone" ? "<span class='tpl-diamond' style='background:#E24B4A;'></span>" : k.t==="client" ? "<span class='tpl-circle' style='background:#D85A30;'></span>" : "<span class='tpl-diamond' style='background:#888780;'></span>";
    var rowCls = k.done ? " class='tpl-done'" : "";
    html += "<tr"+rowCls+"><td class='tpl-task-name "+cls+"' title='"+k.n+"'>"+icon+(k.done?"&#10003; ":"")+k.n+"</td>";
    html += "<td class='tpl-date'>"+fmt(k.d)+"</td>";
    if(showTL) html += "<td></td>";
    html += "</tr>";
  });

  groups.forEach(function(g){
    var isExp = !!expandedGroups[g.id];
    var related = (currentView === "summary") ? keyDates.filter(function(k){ return k.g === g.id && !k.done; }) : keyDates.filter(function(k){ return k.g === g.id; });
    var visibleTasks = (currentView === "summary") ? g.tasks.filter(function(t){ return !t.done; }) : g.tasks;

    html += "<tr class='tpl-group-header'><td colspan='"+cols+"'>";
    html += "<span style='display:inline-block;width:12px;height:8px;background:"+g.color+";border-radius:2px;vertical-align:middle;margin-right:6px;'></span>";
    html += g.name+" <span style='font-weight:400;font-size:11px;color:var(--color-text-secondary);'>("+visibleTasks.length+" tasks)</span>";
    html += progressBar(g.closed, g.total, g.color);
    html += " <button class='tpl-expand' onclick='toggleGroup(\""+g.id+"\")'>"+(isExp?"\u25B2 collapse":"\u25BC expand")+"</button>";
    html += "</td></tr>";

    if(isExp){
      var allItems = [];
      visibleTasks.forEach(function(t){
        allItems.push({type:"task",data:t,sortDate:t.s||t.e});
      });
      related.forEach(function(k){
        allItems.push({type:"key",data:k,sortDate:k.d});
      });
      allItems.sort(function(a,b){ return a.sortDate < b.sortDate ? -1 : a.sortDate > b.sortDate ? 1 : 0; });

      allItems.forEach(function(item){
        if(item.type==="key"){
          var k = item.data;
          var cls = k.t==="milestone" ? "tpl-type-milestone" : k.t==="client" ? "tpl-type-client" : "tpl-type-meeting";
          var icon = k.t==="milestone" ? "<span class='tpl-diamond' style='background:#E24B4A;'></span>" : k.t==="client" ? "<span class='tpl-circle' style='background:#D85A30;'></span>" : "<span class='tpl-diamond' style='background:#888780;'></span>";
          var rowCls = k.done ? " class='tpl-done'" : "";
          html += "<tr"+rowCls+"><td class='tpl-task-name "+cls+"' title='"+k.n+"'>"+icon+(k.done?"&#10003; ":"")+k.n+"</td>";
          html += "<td class='tpl-date'>"+fmt(k.d)+"</td>";
          if(showTL){
            var kPct = pct(toD(k.d));
            var shape = k.t==="milestone" ? "<div style='position:absolute;left:"+kPct+"%;top:50%;transform:translate(-50%,-50%) rotate(45deg);width:10px;height:10px;background:#E24B4A;'></div>" : k.t==="client" ? "<div style='position:absolute;left:"+kPct+"%;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:#D85A30;border-radius:50%;'></div>" : "<div style='position:absolute;left:"+kPct+"%;top:50%;transform:translate(-50%,-50%) rotate(45deg);width:8px;height:8px;background:#888780;'></div>";
            html += barTrack(shape);
          }
          html += "</tr>";
        } else {
          var t = item.data;
          var lp = pct(toD(t.s));
          var wp = Math.max(pct(toD(t.e))-lp, 0.6);
          var isSingle = t.s === t.e;
          var barColor = t.done ? "var(--color-text-secondary)" : g.color;
          var rowCls = t.done ? " class='tpl-done'" : "";
          html += "<tr"+rowCls+"><td class='tpl-task-name' title='"+t.n+"'>"+(t.done?"&#10003; ":"")+t.n+"</td>";
          html += "<td class='tpl-date'>"+fmtR(t.s,t.e)+"</td>";
          if(showTL){
            var inner = "";
            if(isSingle){
              inner = "<div style='position:absolute;left:"+lp+"%;top:50%;transform:translate(-50%,-50%) rotate(45deg);width:8px;height:8px;background:"+barColor+";opacity:"+(t.done?"0.4":"1")+";'></div>";
              inner += "<span class='tpl-bar-label' style='left:calc("+lp+"% + 10px);'>"+fmt(t.s)+"</span>";
            } else {
              inner = "<div class='tpl-bar' style='left:"+lp+"%;width:"+wp+"%;background:"+barColor+";opacity:"+(t.done?"0.35":"1")+";'></div>";
              inner += "<span class='tpl-bar-label' style='left:calc("+lp+"% + "+wp+"% + 6px);'>"+fmtR(t.s,t.e)+"</span>";
            }
            html += barTrack(inner);
          }
          html += "</tr>";
        }
      });
    }
  });

  html += "</tbody>";
  document.getElementById("tpl-table").innerHTML = html;
}

render();
</script>
</body>
</html>
